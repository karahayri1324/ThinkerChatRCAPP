name: rc_app
description: "ThinkerChat Remote Controller - Mobile App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  web_socket_channel: ^3.0.1
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.2
  provider: ^6.1.2
  xterm: ^4.0.0
  file_picker: ^8.1.3
  path_provider: ^2.1.4
  permission_handler: ^11.3.1
  open_file: ^3.5.7
  flutter_launcher_icons: ^0.14.1
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/tc.png"
  adaptive_icon_background: "#1a1b26"
  adaptive_icon_foreground: "assets/tc.png"

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/tc.png
